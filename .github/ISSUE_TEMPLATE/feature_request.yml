name: Feature request
description: 提议可验证、边界明确的 DeepLaw 功能或契约改进
title: "[Feature]: "
labels: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        请描述要解决的问题和可验证的成功条件。不要附加案件私有数据、凭据、原始法源文件、release 数据库或受限正文。

        DeepLaw 仓库只分发 Apache-2.0 代码；法律语料由操作者合法取得并在仓库外治理。安全漏洞请通过 [GitHub Private Vulnerability Reporting](https://github.com/Eysn0130/DeepLaw/security/advisories/new) 私下报告。

  - type: textarea
    id: problem
    attributes:
      label: 问题与使用场景
      description: 当前行为为何不足？请使用合成或公开信息说明，不要提供具体案件事实。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述最小完整行为和用户可观察结果，不要求先给出实现细节。
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: 验收条件
      description: 列出可以由测试、schema、命令输出或其他证据验证的条件。
      placeholder: |
        - Given ... when ... then ...
        - Existing read-only behavior remains unchanged ...
    validations:
      required: true

  - type: dropdown
    id: boundary
    attributes:
      label: 可能影响的边界
      options:
        - No public contract change
        - CLI
        - JSON contract / schema
        - MCP tool behavior
        - Release build / storage
        - Host adapter / skill
        - Documentation only
        - Unsure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
    validations:
      required: false

  - type: textarea
    id: data_impact
    attributes:
      label: 数据、隐私与许可影响
      description: 说明是否需要新输入、派生数据或第三方组件；不要上传实际数据。
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: 提交确认
      options:
        - label: 我没有提交案件私有数据、凭据、原始法源、release 数据库或受限正文。
          required: true
        - label: 此请求不要求把法律语料加入或随 DeepLaw 仓库分发。
          required: true
        - label: 此请求不是要求 DeepLaw 提供法律意见、事实认定或案件结论。
          required: true
        - label: 这不是安全漏洞；安全问题将通过私密渠道报告。
          required: true
